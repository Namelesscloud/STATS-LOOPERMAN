name: Update Looperman Stats

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python looperman_stats.py

      - name: Commit stats.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add stats.json backups/
          git diff --cached --quiet || git commit -m "Update stats $(date +'%Y-%m-%d %H:%M')"
          git push
